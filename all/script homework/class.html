<html>

    <head>
    </head>

    <body>
        
        <p id="details"></p>

        <script>

            class car{
                constructor(brand){
                    this.mobilename = brand
                }
                present() {
                    return 'i dont have a ' + this.mobilename;
                }
            }

            class model extends car {
                constructor(brand,mod) {
                    super(brand);
                    this.Model = mod;
                }
                show() {
                    return this.present() + ', it is a ' + this.Model;
                }
            }

            let myCar = new model("samsung","Iphone");
            document.getElementById("details").innerHTML = myCar.show();

        </script>

    </body>

</html>
