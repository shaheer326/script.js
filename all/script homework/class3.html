<html>

    <head>
    </head>

    <body>
        
        <p id="student1"></p> 
        <p id="student2"></p> 
        
        <script>

            class student {
                constructor(name,year){
                    this.name=name;
                    this.year=year;
                }

                age() {
                    let date = new Date();
                    return date.getFullYear() - this.year;
                }
            }

            student1 = new student ("shaheer",2012);
            document.getElementById("student1").innerHTML = "My name is " + student1.name + ". I was born in " + student1.year + " and my age is " + student1.age();

            student2 = new student ("furqan",2013);
            document.getElementById("student2").innerHTML = "My friend's name is " + student2.name + ". He was born in " + student2.year + " and his age is " + student2.age();


        </script>

    </body>

</html>
